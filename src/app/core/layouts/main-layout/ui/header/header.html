<header
  class="bg-surface-0/70 dark:bg-surface-800/70 border-surface-200 dark:border-surface-700 flex items-center justify-between border-b px-6 py-4 shadow-sm backdrop-blur-lg"
>
  <div>
    <svg lucidePanelLeftClose></svg>
  </div>
  <div class="flex items-center gap-5">
    <app-theme-switcher></app-theme-switcher>
    <app-color-switcher></app-color-switcher>

    <div class="flex items-center gap-3">
      <div class="flex flex-col items-end">
        <span
          class="text-surface-800 dark:text-surface-200 text-sm font-semibold"
        >
          {{ store.displayName() }}
        </span>
        <span class="text-surface-500 dark:text-surface-400 text-xs">
          {{ store.user()?.email }}
        </span>
      </div>
      <!-- Аватар (пока заглушка, позже можно загружать из профиля) -->
      <div
        class="bg-primary-100 dark:bg-primary-800 text-primary-600 dark:text-primary-200 flex h-9 w-9 items-center justify-center rounded-full text-sm font-bold"
      >
        {{ store.displayName().charAt(0).toUpperCase() }}
      </div>
    </div>
  </div>
</header>
