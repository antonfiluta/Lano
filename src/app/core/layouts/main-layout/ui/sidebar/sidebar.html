<aside
  class="bg-surface-0 dark:bg-surface-900 border-surface-200 dark:border-surface-700 shadow-surface-200/50 flex h-full w-64 flex-col border-r shadow-xl dark:shadow-black/20"
>
  <div
    class="border-surface-200 dark:border-surface-700 flex items-center gap-3 border-b px-6 py-5"
  >
    <app-logo [size]="'small'"></app-logo>
  </div>

  <nav class="flex-1 space-y-1 px-3 py-4">
    @for (route of routes; track route.title) {
      <a
        class="text-surface-700 dark:text-surface-300 hover:bg-surface-100 dark:hover:bg-surface-800 flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium transition-colors"
        [routerLink]="route.path"
      >
        <i [class]="'pi pi-' + route.icon"></i>
        {{ route.title }}
      </a>
    }
  </nav>

  <div class="border-surface-200 dark:border-surface-700 border-t p-3">
    <button
      (click)="logout()"
      class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-red-600 transition-colors hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/20"
    >
      <i class="pi pi-sign-out"></i>
      Sign Out
    </button>
  </div>
</aside>
