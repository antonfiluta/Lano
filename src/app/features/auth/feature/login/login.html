<p>login works!</p>
<a routerLink="/auth/register" class="text-blue-600 underline">
  go to register
</a>

<br />
<button (click)="store.logout()" class="text-red-600 underline">LOGOUT</button>

<p>IsAuthenticated: {{ store.isAuthenticated() }}</p>
<p>UserData: {{ store.user()?.email || 'null' }}</p>

<input
  type="text"
  class="border-2"
  placeholder="email"
  [formField]="loginForm.email"
/>

<br /><br />

<input
  type="password"
  class="border-2"
  placeholder="password"
  [formField]="loginForm.password"
/>

<button (click)="submit()">Button</button>
