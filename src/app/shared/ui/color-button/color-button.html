<button
  type="button"
  [title]="title()"
  (click)="setColor.emit()"
  class="size-5 cursor-pointer rounded-full shadow-[0_0_0_1px_rgba(0,0,0,0.15)_inset,0_1px_0_1px_rgba(255,255,255,0.2)_inset,0_-1px_0_1px_rgba(0,0,0,0.2)_inset] outline-2 outline-offset-2 transition-transform duration-150 dark:shadow-[0_0_0_1px_rgba(255,255,255,0.025)_inset,0_1px_0_1px_rgba(255,255,255,0.2)_inset,0_-1px_0_1px_rgba(0,0,0,0.2)_inset]"
  [style.outline-color]="isPicked() ? backgroundColor() : 'transparent'"
  [style.outline-style]="isPicked() ? 'solid' : 'none'"
  [style.background-color]="backgroundColor()"
  [ngClass]="{
    'hover:scale-95': !isPicked(),
    'scale-[80%]': isPicked(),
  }"
></button>
